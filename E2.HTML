<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aesthetic Meeting Workspace</title>

<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

/* =====================================================
   RESET
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif !important;
}

:root{

    --bg:#eef2ff;

    --glass:rgba(255,255,255,0.76);

    --text:#0f172a;
    --sub:#64748b;

    --line:#d6deea;

    --purple:#8b5cf6;
    --blue:#3b82f6;
    --pink:#ec4899;
    --cyan:#06b6d4;
}

/* =====================================================
   BODY
===================================================== */

html,
body{

    width:100%;
    min-height:100%;

    overflow:auto;

    background:
        radial-gradient(circle at top left,#dbeafe,#eef2ff 40%,#f8fafc);

    color:var(--text);
}

/* =====================================================
   BACKGROUND BLUR
===================================================== */

.blur{

    position:fixed;

    border-radius:9999px;

    filter:blur(120px);

    opacity:0.42;

    z-index:0;

    animation:float 12s infinite ease-in-out alternate;
}

.blur1{

    width:420px;
    height:420px;

    background:#bfdbfe;

    top:-100px;
    left:-120px;
}

.blur2{

    width:360px;
    height:360px;

    background:#ddd6fe;

    bottom:-80px;
    right:-60px;

    animation-duration:18s;
}

.blur3{

    width:260px;
    height:260px;

    background:#fbcfe8;

    top:40%;
    left:50%;
}

@keyframes float{

    from{
        transform:translateY(0px) translateX(0px);
    }

    to{
        transform:translateY(30px) translateX(20px);
    }
}

/* =====================================================
   VIEWER
===================================================== */

.viewer{

    position:relative;
    z-index:2;

    width:100%;

    display:flex;
    justify-content:center;

    padding:20px;
}

/* =====================================================
   PAGE
===================================================== */

.page{

    width:820px;
    height:1080px;

    position:relative;

    background:var(--glass);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.7);

    border-radius:28px;

    overflow:hidden;

    padding:28px 36px 100px;

    box-shadow:
        0 40px 100px rgba(15,23,42,0.12),
        0 12px 30px rgba(15,23,42,0.08);

    animation:
        fadeIn 1s ease,
        floating 8s ease-in-out infinite alternate;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:scale(0.96);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes floating{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(-8px);
    }
}

/* =====================================================
   TOPBAR
===================================================== */

.topbar{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:22px;
}

.brand{

    font-size:13px;

    letter-spacing:2px;

    text-transform:uppercase;

    color:var(--sub);

    font-weight:700;
}

.date-picker{

    border:none;
    outline:none;

    background:rgba(255,255,255,0.85);

    border:1px solid var(--line);

    border-radius:12px;

    padding:10px 14px;

    font-size:13px;

    color:var(--text);

    font-weight:600;
}

/* =====================================================
   HERO
===================================================== */

.hero{

    margin-bottom:18px;
}

.hero h1{

    font-size:34px;

    line-height:1.05;

    font-weight:800;

    margin-bottom:8px;
}

.hero p{

    width:72%;

    font-size:14px;

    line-height:1.6;

    color:var(--sub);
}

/* =====================================================
   INFO GRID
===================================================== */

.info-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;

    margin-bottom:14px;
}

.info-card{

    background:rgba(255,255,255,0.78);

    border:1px solid var(--line);

    border-radius:18px;

    padding:14px;
}

.info-label{

    font-size:11px;

    text-transform:uppercase;

    letter-spacing:1px;

    color:var(--sub);

    margin-bottom:7px;

    font-weight:700;
}

.info-input{

    width:100%;

    border:none;
    outline:none;

    background:transparent;

    font-size:14px;

    font-weight:600;

    color:var(--text);
}

/* =====================================================
   SECTION
===================================================== */

.section{

    margin-bottom:12px;
}

.section-header{

    display:flex;
    align-items:center;
    gap:10px;

    margin-bottom:8px;
}

.dot{

    width:11px;
    height:11px;

    border-radius:9999px;
}

.section-title{

    font-size:14px;
    font-weight:700;
}

/* =====================================================
   TEXTAREA
===================================================== */

textarea{

    width:100%;

    border:1.5px solid var(--line);

    outline:none;

    resize:none;

    overflow:hidden;

    background:rgba(255,255,255,0.92);

    border-radius:22px;

    padding:16px;

    font-size:14px;

    line-height:1.8;

    color:var(--text);

    transition:0.25s;
}

textarea:focus{

    border-color:#8b5cf6;

    box-shadow:
        0 0 0 4px rgba(139,92,246,0.08);
}

/* =====================================================
   HEIGHT
===================================================== */

.objective-box{
    height:90px;
}

.discussion-box{
    height:170px; /* 줄임 */
}

.decision-box{
    height:90px;
}

.action-box{
    height:90px;
}

/* =====================================================
   BUTTON
===================================================== */

.buttons{

    display:flex;
    justify-content:center;

    margin-top:18px;
    margin-bottom:16px;
}

.btn{

    border:none;

    padding:15px 40px;

    border-radius:18px;

    cursor:pointer;

    font-size:14px;
    font-weight:700;

    transition:0.25s;

    background:
        linear-gradient(
            135deg,
            #8b5cf6,
            #3b82f6
        );

    color:#fff;

    min-width:200px;

    box-shadow:
        0 14px 30px rgba(124,58,237,0.24);
}

.btn:hover{

    transform:translateY(-2px);
}

/* =====================================================
   FOOTER
===================================================== */

.footer{

    position:absolute;

    bottom:18px;
    left:0;

    width:100%;

    text-align:center;

    font-size:12px;

    color:var(--sub);
}

/* =====================================================
   PRINT
===================================================== */

@media print{

    @page{
        size:A4;
        margin:0;
    }

    html,
    body{

        width:210mm;
        height:297mm;

        overflow:hidden;

        background:#fff;
    }

    .blur{
        display:none;
    }

    .buttons{
        display:none;
    }

    .page{

        width:210mm;
        height:297mm;

        border-radius:0;

        background:#fff;

        box-shadow:none;

        animation:none;

        transform:none !important;

        padding:
            16mm
            10mm
            12mm;

        overflow:hidden;
    }

    .discussion-box{
        height:58mm;
    }

    .objective-box,
    .decision-box,
    .action-box{
        height:24mm;
    }

    textarea{
        overflow:hidden !important;
    }
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="blur blur1"></div>
<div class="blur blur2"></div>
<div class="blur blur3"></div>

<div class="viewer">

    <div class="page">

        <!-- TOPBAR -->
        <div class="topbar">

            <div class="brand">
                Aesthetic Workspace
            </div>

            <input type="date"
                   class="date-picker">

        </div>

        <!-- HERO -->
        <div class="hero">

            <h1>
                Meeting<br>
                Experience
            </h1>

            <p>
                Designed for modern teams who want
                beautiful, immersive and focused
                meeting documentation.
            </p>

        </div>

        <!-- INFO -->
        <div class="info-grid">

            <div class="info-card">

                <div class="info-label">
                    Participants
                </div>

                <input type="text"
                       class="info-input"
                       placeholder="Team members">

            </div>

            <div class="info-card">

                <div class="info-label">
                    Location
                </div>

                <input type="text"
                       class="info-input"
                       placeholder="Meeting room">

            </div>

            <div class="info-card">

                <div class="info-label">
                    Schedule
                </div>

                <input type="text"
                       class="info-input"
                       placeholder="10:00 AM - 11:30 AM">

            </div>

            <div class="info-card">

                <div class="info-label">
                    Host
                </div>

                <input type="text"
                       class="info-input"
                       placeholder="Your name">

            </div>

        </div>

        <!-- OBJECTIVE -->
        <div class="section">

            <div class="section-header">

                <div class="dot"
                     style="background:#8b5cf6"></div>

                <div class="section-title">
                    Objective
                </div>

            </div>

            <textarea class="limit objective-box"></textarea>

        </div>

        <!-- DISCUSSION -->
        <div class="section">

            <div class="section-header">

                <div class="dot"
                     style="background:#3b82f6"></div>

                <div class="section-title">
                    Discussion
                </div>

            </div>

            <textarea class="limit discussion-box"></textarea>

        </div>

        <!-- DECISIONS -->
        <div class="section">

            <div class="section-header">

                <div class="dot"
                     style="background:#ec4899"></div>

                <div class="section-title">
                    Decisions
                </div>

            </div>

            <textarea class="limit decision-box"></textarea>

        </div>

        <!-- ACTION -->
        <div class="section">

            <div class="section-header">

                <div class="dot"
                     style="background:#06b6d4"></div>

                <div class="section-title">
                    Action Items
                </div>

            </div>

            <textarea class="limit action-box"></textarea>

        </div>

        <!-- PDF BUTTON -->
        <div class="buttons">

            <button class="btn"
                    onclick="window.print()">
                Export PDF
            </button>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            © 2026 kr.techsolayw. All Rights Reserved.
        </div>

    </div>

</div>

<script>
/* =====================================================
   LIMIT INPUT
===================================================== */

document.querySelectorAll('.limit').forEach(textarea => {

    let previous = '';

    textarea.addEventListener('input', function(){

        if(this.scrollHeight > this.clientHeight + 2){

            this.value = previous;

        }else{

            previous = this.value;
        }
    });
});
</script>

</body>
</html>
